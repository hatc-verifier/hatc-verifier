<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification</title>
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #fff; }
    
    /* হেডার এবং লোগো সেকশন */
    .header { text-align: center; padding: 10px 0; border-bottom: 2.5px solid #555; }
    .header img { width: 100%; max-width: 900px; height: auto; display: block; margin: 0 auto; }
    
    /* মেইন কন্টেইনার - সবকিছু মাঝখানে রাখার জন্য */
    .container { 
      max-width: 900px; 
      margin: 15px auto; 
      padding: 0 10px; 
      display: flex;
      flex-direction: column;
      align-items: center; 
    }
    
    /* উপরের নির্দেশনামূলক লেখা - এক লাইনে রাখার জন্য */
    .instruction { 
      font-size: 13px; 
      font-weight: bold; 
      color: #000;
      margin-bottom: 15px; 
      border-bottom: 1px solid #ccc; 
      padding-bottom: 12px;
      width: 100%;
      text-align: center;
    }

    /* সার্চ রো (C.No, Input, Button) */
    .search-row { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 8px; 
      width: 100%;
    }

    span { font-size: 14px; font-weight: normal; }

    /* ইনপুট বক্সের ছোট ও চিকন সাইজ */
    input { 
      padding: 2px 5px; 
      font-size: 14px; 
      border: 1px solid #7a7a7a; 
      width: 150px; 
      height: 20px; 
      outline: none;
    }

    /* চেক বাটন */
    button { 
      padding: 0 10px; 
      font-size: 12px; 
      background: #efefef; 
      border: 1px solid #767676; 
      cursor: pointer; 
      height: 26px;
      white-space: nowrap;
    }

    /* মোবাইলের জন্য রেসপনসিভ ডিজাইন */
    @media (max-width: 600px) {
      .instruction { 
        font-size: 10.5px; 
      }
      input { width: 130px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="header.png" alt="Header">
  </div>

  <div class="container">
    <div class="instruction">
      This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).
    </div>

    <div class="search-row">
      <span>C.No</span>
      <input type="text" id="certNo">
      <button onclick="checkCertificate()">check certificate</button>
    </div>
  </div>

  <script>
    function checkCertificate() {
      const no = document.getElementById('certNo').value.trim();
      
      // খালি বক্স চেক করার লজিক
      if (no === "") { 
        alert("Please enter Certificate Number"); 
      } 
      else { 
        // সঠিক নম্বর থাকলে রেজাল্ট পেজে নিয়ে যাবে
        window.location.href = 'certificate.html?cno=' + no; 
      }
    }

    // কিবোর্ডের এন্টার (Enter) চাপলে কাজ করার জন্য
    document.getElementById("certNo").addEventListener("keyup", function(event) {
      if (event.key === "Enter") {
        checkCertificate();
      }
    });
  </script>

</body>
</html>
