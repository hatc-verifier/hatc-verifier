<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
    }
    .header {
      text-align: center;
      padding: 10px 0;
    }
    .header img {
      width: 100%;
      max-width: 900px;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .container {
      max-width: 600px;
      margin: 30px auto;
      text-align: center;
      padding: 0 15px;
    }
    h1 {
      font-size: 28px;
      font-weight: bold;
      margin: 20px 0 10px;
    }
    p {
      font-size: 16px;
      margin: 0 0 30px;
    }
    .search-form {
      display: flex;
      max-width: 450px;
      margin: 0 auto;
    }
    input {
      flex: 1;
      padding: 12px;
      font-size: 18px;
      border: 1px solid #000;
    }
    button {
      padding: 12px 25px;
      font-size: 18px;
      background: #006600;
      color: white;
      border: none;
      cursor: pointer;
    }
    @media (max-width: 600px) {
      .search-form {
        flex-direction: column;
      }
      input, button {
        width: 100%;
        margin-bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="header.png" alt="Header">
  </div>

  <div class="container">
    <h1>Certificate Verification</h1>
    <p>This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).</p>

    <div class="search-form">
      <input type="text" id="certNo" placeholder="C.No">
      <button onclick="checkCertificate()">check certificate</button>
    </div>
  </div>

  <script>
    function checkCertificate() {
      const no = document.getElementById('certNo').value.trim();
      if (!no) {
        alert('error C.No!');
        return;
      }
      window.location.href = 'certificate.html?cno=' + no;
    }
  </script>
</body>
</html>
