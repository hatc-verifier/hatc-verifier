<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification - HAT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <div class="logos">
      <img src="hat-logo.png" alt="Human Assets Training" class="hat-logo">
      <img src="cambridge-logo.png" alt="Cambridge Regional College" class="cambridge-logo">
    </div>
    <h2>Human Assets Training</h2>
    <p>الأصول البشرية للتدريب</p>
    <p>Cambridge Regional College - first for training & skills</p>
  </div>

  <hr>

  <div class="container">
    <h1>Certificate Verification</h1>
    <p>This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).</p>
    
    <div class="search-box">
      <input type="text" id="certNo" placeholder="C.No" value="121086">
      <button onclick="checkCertificate()">check certificate</button>
    </div>
    
    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
