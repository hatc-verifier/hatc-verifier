<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification</title>
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #fff; }
    .header { text-align: center; padding: 10px 0; border-bottom: 2px solid #555; }
    .header img { width: 100%; max-width: 900px; height: auto; display: block; margin: 0 auto; }
    .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
    .instruction { 
      font-size: 11px; font-weight: bold; color: #000;
      margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 15px;
      line-height: 1.4;
    }
    .search-row { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; }
    span { font-size: 15px; font-weight: normal; }
    input { 
      padding: 4px 8px; font-size: 16px; border: 1px solid #000; 
      width: 60%; max-width: 250px; height: 25px;
    }
    button { 
      padding: 0 10px; font-size: 13px; background: #efefef; 
      border: 1px solid #767676; cursor: pointer; height: 35px;
      white-space: nowrap;
    }
    @media (max-width: 400px) {
      span { font-size: 13px; }
      input { width: 50%; }
      button { font-size: 11px; padding: 0 5px; }
    }
  </style>
</head>
<body>
  <div class="header"><img src="header.png" alt="Header"></div>
  <div class="container">
    <div class="instruction">
      This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).
    </div>
    <div class="search-row">
      <span>C.No</span>
      <input type="text" id="certNo" placeholder="">
      <button onclick="checkCertificate()">check certificate</button>
    </div>
  </div>
  <script>
    function checkCertificate() {
      const no = document.getElementById('certNo').value.trim();
      if (no) { window.location.href = 'certificate.html?cno=' + no; }
      else { alert("Please enter Certificate Number"); }
    }
    document.getElementById("certNo").addEventListener("keyup", function(event) {
      if (event.key === "Enter") checkCertificate();
    });
  </script>
</body>
</html>
