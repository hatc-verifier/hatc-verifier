<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #fff; color: #000; line-height: 1.5; }
    .header { text-align: center; background: #fff; padding: 20px 0; }
    .header img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
    .container { max-width: 600px; margin: 30px auto; padding: 0 20px; text-align: center; }
    h1 { font-size: 28px; font-weight: bold; margin: 20px 0 15px; }
    p { font-size: 16px; margin-bottom: 30px; }
    .search-form { display: flex; max-width: 450px; margin: 0 auto; }
    input { flex: 1; padding: 12px; font-size: 18px; border: 1px solid #000; border-right: none; }
    button { padding: 12px 30px; font-size: 18px; background: #006600; color: white; border: 1px solid #006600; cursor: pointer; }
    button:hover { background: #004d00; }
    @media (max-width: 600px) {
      .search-form { flex-direction: column; }
      input { border-right: 1px solid #000; margin-bottom: 10px; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="header.png" alt="Header Logo">
  </div>

  <div class="container">
    <h1>Certificate Verification</h1>
    <p>This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).</p>

    <div class="search-form">
      <input type="text" placeholder="C.No">
      <button>check certificate</button>
    </div>
  </div>
</body>
</html>
