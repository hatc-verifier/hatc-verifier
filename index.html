<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification</title>
  <style>
    body { margin:0; padding:0; font-family:Arial,sans-serif; background:#fff; color:#000; }
    .header { text-align:center; padding:10px 0; background:#fff; }
    .header img { max-width:100%; height:auto; display:block; margin:0 auto; }
    .main { max-width:600px; margin:30px auto; text-align:center; padding:0 20px; }
    h1 { font-size:28px; font-weight:bold; margin:20px 0 10px; color:#000; }
    p { font-size:16px; margin:0 0 30px; line-height:1.4; }
    .search { display:flex; max-width:450px; margin:0 auto; }
    input { flex:1; padding:10px; font-size:16px; border:1px solid #000; border-right:none; }
    button { padding:10px 25px; font-size:16px; background:#006600; color:#fff; border:1px solid #006600; cursor:pointer; }
    button:hover { background:#004d00; }
    @media (max-width:600px) {
      .search { flex-direction:column; }
      input { border-right:1px solid #000; margin-bottom:10px; }
      button { width:100%; }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="header.png" alt="Header">
  </div>

  <div class="main">
    <h1>Certificate Verification</h1>
    <p>This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).</p>

    <div class="search">
      <input type="text" placeholder="C.No">
      <button>check certificate</button>
    </div>
  </div>
</body>
</html>
