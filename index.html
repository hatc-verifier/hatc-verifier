<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <img src="header.png" alt="Header">
  </div>

  <div class="main">
    <h1>Certificate Verification</h1>
    <p>This search engine will help you to find out whether the certificate is true or not, please enter C. No (Certificate No).</p>

    <div class="search-form">
      <input type="text" id="certNo" placeholder="C.No">
      <button onclick="checkCertificate()">check certificate</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
